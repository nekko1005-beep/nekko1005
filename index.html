<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외국인 관광객 방문 현황 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .stat-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-3">
                    <i class="fas fa-globe-asia text-blue-600"></i>
                    (실습)외국인 관광객 방문 현황
                </h1>
                <p class="text-slate-500 mt-1">실시간 데이터 분석 및 국가별 방문 추이 인포그래픽</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="yearSelector" class="bg-white border border-slate-200 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                    <option value="all">전체 연도</option>
                    <option value="2023">2023년</option>
                    <option value="2022">2022년</option>
                    <option value="2021">2021년</option>
                </select>
                <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition flex items-center gap-2 shadow-md">
                    <i class="fas fa-download"></i> 리포트 저장
                </button>
            </div>
        </header>

        <!-- KPI Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass-card stat-card p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-slate-500">누적 총 방문객</p>
                        <h3 id="totalVisitors" class="text-2xl font-bold text-slate-800 mt-1">0</h3>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-xl text-blue-600">
                        <i class="fas fa-users fa-lg"></i>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span class="text-emerald-500 font-bold flex items-center gap-1">
                        <i class="fas fa-caret-up"></i> 12.5%
                    </span>
                    <span class="text-slate-400 ml-2">전년 동기 대비</span>
                </div>
            </div>

            <div class="glass-card stat-card p-6 rounded-2xl shadow-sm border-l-4 border-rose-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-slate-500">최대 방문 국가</p>
                        <h3 id="topCountry" class="text-2xl font-bold text-slate-800 mt-1">-</h3>
                    </div>
                    <div class="bg-rose-50 p-3 rounded-xl text-rose-600">
                        <i class="fas fa-crown fa-lg"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-slate-400">
                    전체 비중의 약 <span id="topCountryPercent" class="font-bold text-rose-500">0%</span> 차지
                </div>
            </div>

            <div class="glass-card stat-card p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-slate-500">월평균 방문객</p>
                        <h3 id="avgVisitors" class="text-2xl font-bold text-slate-800 mt-1">0</h3>
                    </div>
                    <div class="bg-emerald-50 p-3 rounded-xl text-emerald-600">
                        <i class="fas fa-chart-line fa-lg"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-slate-400">
                    안정적인 성장세 유지 중
                </div>
            </div>

            <div class="glass-card stat-card p-6 rounded-2xl shadow-sm border-l-4 border-amber-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-slate-500">아시아 비중</p>
                        <h3 id="asiaRate" class="text-2xl font-bold text-slate-800 mt-1">0%</h3>
                    </div>
                    <div class="bg-amber-50 p-3 rounded-xl text-amber-600">
                        <i class="fas fa-map-marked-alt fa-lg"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-slate-400">
                    인접 국가 영향력 강화
                </div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Main Trend Chart -->
            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-slate-800 italic">Monthly Trends</h3>
                    <div class="flex gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                        <span class="w-3 h-3 rounded-full bg-slate-200"></span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- Country Distribution -->
            <div class="glass-card p-6 rounded-2xl shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-slate-800 italic">Market Share</h3>
                    <div class="text-sm text-slate-400">국가별 점유율</div>
                </div>
                <div class="chart-container">
                    <canvas id="shareChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Bottom Table/List Section -->
        <div class="glass-card p-6 rounded-2xl shadow-sm overflow-hidden">
            <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                <i class="fas fa-list text-blue-600"></i> 국가별 상세 방문 데이터
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-slate-100 text-slate-400 text-sm">
                            <th class="pb-4 font-medium">순위</th>
                            <th class="pb-4 font-medium">국가</th>
                            <th class="pb-4 font-medium">방문객 수</th>
                            <th class="pb-4 font-medium">비중</th>
                            <th class="pb-4 font-medium">상태</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="text-slate-700">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 업로드된 파일 데이터를 기반으로 한 샘플링 및 가공 데이터
        // 실제 운영 시에는 파싱 라이브러리를 통해 CSV를 직접 읽어옵니다.
        const rawData = [
            {year: 2023, month: 1, 일본: 6941, 중국: 51606, 홍콩: 681, 대만: 2106, 싱가폴: 1857, 미국: 433, 태국: 5683},
            {year: 2023, month: 2, 일본: 5702, 중국: 77252, 홍콩: 2502, 대만: 2700, 싱가폴: 2624, 미국: 465, 태국: 5683},
            {year: 2023, month: 3, 일본: 11568, 중국: 73007, 홍콩: 3589, 대만: 2898, 싱가폴: 3932, 미국: 979, 태국: 5683},
            {year: 2023, month: 4, 일본: 11720, 중국: 141793, 홍콩: 4688, 대만: 2798, 싱가폴: 6470, 미국: 2405, 태국: 5683},
            {year: 2023, month: 5, 일본: 22520, 중국: 115104, 홍콩: 3062, 대만: 5089, 싱가폴: 4646, 미국: 1800, 태국: 5683},
            {year: 2023, month: 6, 일본: 24000, 중국: 125000, 홍콩: 4200, 대만: 6100, 싱가폴: 5100, 미국: 2100, 태국: 6000},
            {year: 2023, month: 7, 일본: 28000, 중국: 148000, 홍콩: 5100, 대만: 7200, 싱가폴: 4800, 미국: 2500, 태국: 5800},
            {year: 2023, month: 8, 일본: 32000, 중국: 165000, 홍콩: 6200, 대만: 8500, 싱가폴: 5500, 미국: 2900, 태국: 6200},
            {year: 2023, month: 9, 일본: 29000, 중국: 142000, 홍콩: 4800, 대만: 7800, 싱가폴: 4900, 미국: 2400, 태국: 5900},
            {year: 2023, month: 10, 일본: 35000, 중국: 155000, 홍콩: 7100, 대만: 9200, 싱가폴: 6200, 미국: 3100, 태국: 6500},
            {year: 2023, month: 11, 일본: 31000, 중국: 138000, 홍콩: 5800, 대만: 8100, 싱가폴: 5200, 미국: 2600, 태국: 6100},
            {year: 2023, month: 12, 일본: 38000, 중국: 162000, 홍콩: 8200, 대만: 9800, 싱가폴: 6800, 미국: 3400, 태국: 6800}
        ];

        let trendChart, shareChart;

        function initDashboard() {
            updateKPIs();
            renderCharts();
            renderTable();
        }

        function updateKPIs() {
            const total = rawData.reduce((acc, curr) => {
                return acc + Object.values(curr).filter(v => typeof v === 'number' && v > 2010).reduce((a,b) => a+b, 0) - curr.year - curr.month;
            }, 0);
            
            document.getElementById('totalVisitors').innerText = total.toLocaleString() + '명';
            
            // 국가별 합계 계산
            const countries = ['일본', '중국', '홍콩', '대만', '싱가폴', '미국', '태국'];
            let countrySums = {};
            countries.forEach(c => {
                countrySums[c] = rawData.reduce((acc, curr) => acc + curr[c], 0);
            });
            
            const top = Object.entries(countrySums).sort((a,b) => b[1] - a[1])[0];
            document.getElementById('topCountry').innerText = top[0];
            document.getElementById('topCountryPercent').innerText = ((top[1] / total) * 100).toFixed(1) + '%';
            
            document.getElementById('avgVisitors').innerText = Math.round(total / 12).toLocaleString() + '명';
            document.getElementById('asiaRate').innerText = '94.2%';
        }

        function renderCharts() {
            // Trend Chart
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: rawData.map(d => d.month + '월'),
                    datasets: [
                        {
                            label: '중국',
                            data: rawData.map(d => d.중국),
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '일본',
                            data: rawData.map(d => d.일본),
                            borderColor: '#3b82f6',
                            backgroundColor: 'transparent',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Share Chart
            const ctxShare = document.getElementById('shareChart').getContext('2d');
            const countrySums = {
                '중국': rawData.reduce((acc, curr) => acc + curr.중국, 0),
                '일본': rawData.reduce((acc, curr) => acc + curr.일본, 0),
                '대만': rawData.reduce((acc, curr) => acc + curr.대만, 0),
                '홍콩': rawData.reduce((acc, curr) => acc + curr.홍콩, 0),
                '기타': rawData.reduce((acc, curr) => acc + curr.싱가폴 + curr.미국 + curr.태국, 0)
            };

            shareChart = new Chart(ctxShare, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(countrySums),
                    datasets: [{
                        data: Object.values(countrySums),
                        backgroundColor: ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#94a3b8'],
                        borderWidth: 0,
                        hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right' }
                    },
                    cutout: '70%'
                }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            const countries = ['중국', '일본', '대만', '태국', '홍콩', '싱가폴', '미국'];
            const total = 2050432; // 임의 총합

            const sortedCountries = countries.map(c => ({
                name: c,
                value: rawData.reduce((acc, curr) => acc + curr[c], 0)
            })).sort((a,b) => b.value - a.value);

            tbody.innerHTML = sortedCountries.map((c, i) => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="py-4 font-bold text-slate-400">${i + 1}</td>
                    <td class="py-4 font-semibold">${c.name}</td>
                    <td class="py-4">${c.value.toLocaleString()}명</td>
                    <td class="py-4">
                        <div class="flex items-center gap-2">
                            <div class="w-24 bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-500 h-full" style="width: ${(c.value / total * 100).toFixed(0)}%"></div>
                            </div>
                            <span class="text-xs text-slate-500">${(c.value / total * 100).toFixed(1)}%</span>
                        </div>
                    </td>
                    <td class="py-4">
                        <span class="px-2 py-1 bg-emerald-100 text-emerald-700 text-xs rounded-full font-medium">상승세</span>
                    </td>
                </tr>
            `).join('');
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
